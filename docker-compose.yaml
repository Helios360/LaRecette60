services:
  mysql:
    image: mysql:latest
    container_name: larecette-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: larecette
      MYSQL_USER: larecetteuser
      MYSQL_PASSWORD: macaronnette
    ports:
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: